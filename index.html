            background-color: white;
            color: #333;
            font-weight: bold;
            border-bottom: 2px solid #6c5ce7;

            border: 1px solid #eee;

            padding: 20px;
            background-color: white;
            border-radius: 0 5px 5px 5px;
            width: 100%;
            box-sizing: border-box;
        }

            font-size: 14px;
            color: #333;

            color: #cdd6f4;
            line-height: 1.6;

            border-radius: 10px;
            font-size: 16px;

                content: '<p>학생회장 김민종씨는 요즘 노의환 선생님에대해 불만이 많다</p><p>자신에게 너무 막대한 양의 일과 업무를 주기 때문이다</p><p>그는 너무 화를 많이 받은 나머지 폭주하게 되어, 선생님에게 반항하는 꿈을 꾸게 되었다</p><p>한 정수 n을 입력받을때, 그 정수만큼 리스트의 사이클을 돌면서 선생님의 이름을 출력하시오</p><hr><p>이때 리스트의 값은 영어선생님, 국어선생님, 사회선생님, 수학선생님 순으로 사이클을 돌아간다</p>',
                testCases: [
                    { input: '3', expected: '영어선생님\n국어선생님\n사회선생님' },
                    { input: '4', expected: '영어선생님\n국어선생님\n사회선생님\n수학선생님' },
                    { input: '7', expected: '영어선생님\n국어선생님\n사회선생님\n수학선생님\n영어선생님\n국어선생님\n사회선생님' },
                ]
            },
            '16': {
                title: '[리스트+반복문] #16: 가라 피카츄! 야르킁킁!',
                content: '<p>우리의 위대한 지우가 태초마을을 탐방하면서 포켓몬 4마리를 잡았다</p><p>지우의 가방에는 지금 피카츄, 파이리, 꼬부기, 이상해씨가 있다</p><p>어느날 갑자기 마을애 개 폐급 듀오가 등장해서 포켓몬들을 소환하게 되았다.</p><p>피카츄는 백만볼트, 파이리는 화염방사 공격, 꼬부기는 물대포 공격, 이상해씨는 덩굴채찍 공격 이 있다.</p><p>이때 for문으로 돌아가면서 포켓몬과 스킬을 출력하는 코드를 작성하시오</p><hr><p><b>개폐급듀오</b></p><img src="https://img1.daumcdn.net/thumb/R1280x0/?scode=mtistory2&fname=https%3A%2F%2Fblog.kakaocdn.net%2Fdna%2FA7m1L%2FdJMcaaFpKxn%2FAAAAAAAAAAAAAAAAAAAAABdTQsAf-kB44V5IQ7IXGKBSTjAFDv82vYStjssT5hsb%2Fimg.jpg%3Fcredential%3DyqXZFxpELC7KVnFOS48ylbz2pIh7yKj8%26expires%3D1780239599%26allow_ip%3D%26allow_referer%3D%26signature%3DezJMVWnEKo59uqz%252Fufr0UOuvDUs%253D"><img src="https://img1.daumcdn.net/thumb/R1280x0/?scode=mtistory2&fname=https%3A%2F%2Fblog.kakaocdn.net%2Fdna%2F7S9Ya%2FdJMcajhZbLI%2FAAAAAAAAAAAAAAAAAAAAADVbexoGv_oQefU5WWmWMtMG3xgK4e4vaPRQM4QX0XA7%2Fimg.jpg%3Fcredential%3DyqXZFxpELC7KVnFOS48ylbz2pIh7yKj8%26expires%3D1780239599%26allow_ip%3D%26allow_referer%3D%26signature%3DVPMGtoawfdch28tOyW0mJef2erA%253D">',
                testCases: [
                    { input: '', expected: '피카츄\n백만볼트\n파이리\n화염방사\n꼬부기\n물대포\n이상해씨\n덩굴채찍' },
                ]

        };
const routes = {
        '': {
            title: '2than online judge',
            content: `
                <h2>환영합니다!</h2>
                <p>파이썬 코드를 작성하고 버튼을 눌러 채점하세요!</p>
                <br>
                <p>This web is made by <a href="https://www.instagram.com/2._.than/" class="link">2than</a></p>
            `
        },
        '/problems': {
            title: 'problem list',
            contentGenerator: () => {
                let html = '<h2>문제</h2><div class="problem-list"><ul>';
                for (const id in problemData) {
                    html += `<li><a href="#/problems/${id}" data-path="/problems/${id}">${problemData[id].title}</a></li>`;
                }
                html += '</ul></div>';
                return html;
            },
            cssClass: 'problem-list'
        }
    };

    // [수정됨] 제출 탭 구성 함수 (하나로 통합)
    function buildSubmissionTab(problemId) {
    // 내부의 테스트케이스 생성 로직을 모두 지우고 HTML 구조만 남깁니다.
        return `
            <div class="submission-area">
                <div class="submission-desc">
                    <b>채점 방법</b><br>
                    파이썬 코드를 아래에 작성하고 <b>채점하기</b> 버튼을 누르세요!
                </div>
                <label class="output-label">파이썬 코드 작성</label>
                <textarea id="output-input" placeholder="print('Hello World')"></textarea>
                <button id="submit-btn" onclick="judgeCode('${problemId}')">채점하기</button>
                <div id="result-box"></div>
            </div>
        `;
    }

    // [수정됨] 실제 파이썬 코드 실행 및 채점 로직
    async function judgeCode(problemId) {
        const userCode = document.getElementById('output-input').value;
        const resultBox = document.getElementById('result-box');
        const submitBtn = document.getElementById('submit-btn');
        const problem = problemData[problemId];

        if (!userCode.trim()) return alert("코드를 입력하세요!");

        // Pyodide 엔진 로드 확인
        if (!window.pyodide) {
            resultBox.style.display = 'block';
            resultBox.innerText = "파이썬 엔진을 준비 중입니다 (잠시만 기다려주세요)...";
            window.pyodide = await loadPyodide();
        }

        submitBtn.disabled = true;
        resultBox.style.display = 'block';
        resultBox.className = '';
        resultBox.innerText = "채점 중...";

        try {
            let passCount = 0;
            const cases = problem.testCases || [];

            if (cases.length === 0) {
                resultBox.innerText = "이 문제는 자동 채점을 지원하지 않습니다.";
                submitBtn.disabled = false;
                return;
            }

            for (const tc of cases) {
                // 테스트케이스별 입력값 및 출력 가로채기 설정
                const setupScript = `
import sys, io
sys.stdout = io.StringIO()
input_data = ${JSON.stringify(tc.input.split(/\s+/).filter(x => x !== ''))}
def input(p=''): return input_data.pop(0) if input_data else ""
`;
                await pyodide.runPythonAsync(setupScript + "\n" + userCode);
                const output = pyodide.runPython("sys.stdout.getvalue()");
                
                if (normalize(output) === normalize(tc.expected)) {
                    passCount++;
                }
            }

            if (passCount === cases.length) {
                resultBox.className = 'correct';
                resultBox.innerText = "✅ 맞았습니다! 모든 테스트 통과!";
            } else {
                resultBox.className = 'wrong';
                resultBox.innerText = `❌ 틀렸습니다. (${passCount}/${cases.length} 통과)`;
            }
        } catch (err) {
            resultBox.className = 'wrong';
            resultBox.innerText = "⚠️ 런타임 에러:\n" + err.message;
        } finally {
            submitBtn.disabled = false;
        }
    }

    function normalize(str) {
        return str.toString().trim().replace(/\r\n/g, '\n').split('\n').map(line => line.trimEnd()).join('\n');
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderPage(path) {
        mainContent.className = '';
        let route = routes[path];
        let currentProblemId = null;
        let currentTabName = 'problem';

        if (!route && path.startsWith('/problems/')) {
            const parts = path.substring('/problems/'.length).split('/');
            currentProblemId = parts[0];
            currentTabName = parts.length > 1 ? parts[1] : 'problem';

            if (problemData[currentProblemId]) {
                route = {
                    title: problemData[currentProblemId].title,
                    contentGenerator: () => `
                        <h2 class="problem-title">${problemData[currentProblemId].title}</h2>
                        <div class="problem-tabs">
                            <button class="tab-button" data-tab="problem" data-problem-id="${currentProblemId}">문제</button>
                            <button class="tab-button" data-tab="submission" data-problem-id="${currentProblemId}">제출</button>
                        </div>
                        <div class="tab-content-container">
                            <div id="problem-tab-content" class="tab-pane">
                                <div class="problem-detail-content">
                                    ${problemData[currentProblemId].content}
                                </div>
                            </div>
                            <div id="submission-tab-content" class="tab-pane">
                                ${buildSubmissionTab(currentProblemId)}
                            </div>
                        </div>
                    `,
                    cssClass: 'problem-detail'
                };
            }
        }

        if (route) {
            mainContent.innerHTML = route.contentGenerator ? route.contentGenerator() : route.content;
            document.title = route.title;
            if (route.cssClass) mainContent.classList.add(route.cssClass);
            if (currentProblemId) activateTab(currentTabName);
        } else {
            history.replaceState({ path: '' }, '', '#');
            renderPage('');
        }
    }

    function activateTab(tabName) {
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
        const activeButton = document.querySelector(`.tab-button[data-tab="${tabName}"]`);
        if (activeButton) activeButton.classList.add('active');
        const activePane = document.getElementById(`${tabName}-tab-content`);
        if (activePane) activePane.classList.add('active');
    }

    logoImage.addEventListener('click', () => {
        history.pushState({ path: '' }, '', '#');
        renderPage('');
    });

    problemButton.addEventListener('click', () => {
        const path = '/problems';
        history.pushState({ path }, '', `#${path}`);
        renderPage(path);
    });

    mainContent.addEventListener('click', (event) => {
        const target = event.target;
        if (target.tagName === 'A' && target.dataset.path && target.dataset.path.startsWith('/problems/')) {
            event.preventDefault();
            const fullPath = `${target.dataset.path}/problem`;
            history.pushState({ path: fullPath }, '', `#${fullPath}`);
            renderPage(fullPath);
        } else if (target.classList.contains('tab-button')) {
            const tabName = target.dataset.tab;
            const problemId = target.dataset.problemId;
            if (tabName && problemId) {
                const newPath = `/problems/${problemId}/${tabName}`;
                history.pushState({ path: newPath }, '', `#${newPath}`);
                renderPage(newPath);
            }
        }
    });

    window.addEventListener('popstate', () => {
        renderPage(location.hash.substring(1) || '');
    });

    window.addEventListener('load', () => {
        const initialHash = location.hash.substring(1) || '';
        renderPage(initialHash);
        if (initialHash.startsWith('/problems/') && initialHash.split('/').length === 2) {
            history.replaceState({ path: `${initialHash}/problem` }, '', `#${initialHash}/problem`);
        } else {
            history.replaceState({ path: initialHash }, '', `#${initialHash}`);
        }
    });
    </script>
</body>
