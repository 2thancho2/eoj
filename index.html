        .tab-content-container {

        /* ── 제출 탭 ── */

        /* 로그인 필요 안내 박스 */

            font-weight: bold;

            display: block;
        }
        #output-input {

    <script>
    const firebaseConfig = {
    databaseURL: "https://than-7d1e3-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let devtools = false;
    const threshold = 160;
    function getTier(userId, score) {
        if (ADMINS.includes(userId)) return { name: 'Grandmaster', color: '#c0392b', img: '그랜드마스터 URL', rank: 99 };

        const tiers = [
            { name: 'Bronze V',   min: 29,   color: '#cd7f32' },
            { name: 'Bronze IV',  min: 59,   color: '#cd7f32' },
            { name: 'Bronze III', min: 89,  color: '#cd7f32' },
            { name: 'Bronze II',  min: 119,  color: '#cd7f32' },
            { name: 'Bronze I',   min: 149,  color: '#cd7f32' },
            { name: 'Silver V',   min: 199,  color: '#a0a0a0' },
            { name: 'Silver IV',  min: 249,  color: '#a0a0a0' },
            { name: 'Silver III', min: 299,  color: '#a0a0a0' },
            { name: 'Silver II',  min: 349,  color: '#a0a0a0' },
            { name: 'Silver I',   min: 299,  color: '#a0a0a0' },
            { name: 'Gold V',     min: 499,  color: '#f1c40f' },
            { name: 'Gold IV',    min: 599,  color: '#f1c40f' },
            { name: 'Gold III',   min: 699,  color: '#f1c40f' },
            { name: 'Gold II',    min: 799,  color: '#f1c40f' },
            { name: 'Gold I',     min: 949, color: '#f1c40f' },
            { name: 'Platinum V', min: 1099, color: '#00c8ff' },
            { name: 'Platinum IV',min: 1249, color: '#00c8ff' },
            { name: 'Platinum III',min:1399, color: '#00c8ff' },
            { name: 'Platinum II',min: 1549, color: '#00c8ff' },
            { name: 'Platinum I', min: 1749, color: '#00c8ff' },
            { name: 'Master V',   min: 1949, color: '#9b59b6' },
            { name: 'Master IV',  min: 2149, color: '#9b59b6' },
            { name: 'Master III', min: 2349, color: '#9b59b6' },
            { name: 'Master II',  min: 2539, color: '#9b59b6' },
            { name: 'Master I',   min: 2699, color: '#9b59b6' },
        ];


        let result = tiers[0];
        for (const t of tiers) {
            if (score >= t.min) result = t;
            else break;
        }
        return result;
    }

function getUserScore(userId) {
    const history = getSubmissionHistory()
        .filter(h => h.user === userId && h.result === '맞았습니다');

    // 문제별 최초 정답만 점수 인정 (중복 제거)
    const solved = new Set();
    let total = 0;
    history.forEach(h => {
        if (!solved.has(h.problemId)) {
            solved.add(h.problemId);
            total += problemData[h.problemId]?.score || 0;
        }
    });
    return total;
}
    setInterval(() => {
    if (window.outerWidth - window.innerWidth > threshold ||
        window.outerHeight - window.innerHeight > threshold) {
        devtools = true;
        document.body.innerHTML = ""; // 또는 경고 표시
    }
    }, 500);
    const ADMIN_PASSWORD = "iamadmin";
    // ══════════════════════════════════════════
    //  ★ 계정 목록 — 여기서 직접 수정하세요 ★
    // ══════════════════════════════════════════
    const ADMINS = ['최이든','김민종'];  // ← 관리자 아이디 목록
    const ACCOUNTS = [
        { id: '최이든',pw: 'iamadmin'   },
        { id: '김민종', pw: '30808' },
        { id: '박하준', pw: '30615' },
        { id: '정준우', pw: '30525' },
        { id: '박시완', pw: '30609' },
        { id: '신지섭', pw: '30616' },
        { id: '최지혁', pw: '20733' },
        { id: '채유승', pw: '20132' },
        { id: '전하성', pw: '30430' },
        { id: '한정우', pw: '30130' },
        { id: '이주원', pw: '10321' },
        { id: '김다함', pw: '30403' },
        { id: '김의찬', pw: '21011' },
        { id: '박관률', pw: '30109' },
        // 필요한 만큼 추가하면 됩니다
        // { id: 'newuser', pw: 'newpass' },
    ];
    // ══════════════════════════════════════════
    function checkAdminPassword() {
        const pw = prompt("관리자 비밀번호를 입력하세요");

        if (pw !== ADMIN_PASSWORD) {
            alert("비밀번호가 틀렸습니다.");
            return false;
        }

        return true;
    }
    function clearAllHistory() {
        if (!ADMINS.includes(getSession()?.id)) return alert('관리자만 가능합니다.');
        if (!confirm('전체 기록을 삭제할까요?')) return;

        db.ref('submissions').remove().then(() => {
            localStorage.removeItem('submission_history');
            alert('전체 삭제 완료');
            renderPage(location.hash.substring(1) || '');
        });
    }
    function clearUserHistory(userId) {
        if (!ADMINS.includes(getSession()?.id)) return alert('관리자만 가능합니다.');
        if (!confirm(`${userId}님의 기록을 삭제할까요?`)) return;

        db.ref('submissions').once('value').then(snapshot => {
            const data = snapshot.val();
            if (!data) return;
            const updates = {};
            Object.entries(data).forEach(([key, val]) => {
                if (val.user === userId) updates[key] = null;
            });
            db.ref('submissions').update(updates).then(() => {
                const local = getSubmissionHistory().filter(h => h.user !== userId);
                localStorage.setItem('submission_history', JSON.stringify(local));
                alert(`${userId} 삭제 완료`);
                renderPage(location.hash.substring(1) || '');
            });
        });
    }
    function clearProblemHistory(problemId) {
        if (!ADMINS.includes(getSession()?.id)) return alert('관리자만 가능합니다.');
        if (!confirm(`문제 ${problemId}번 기록을 삭제할까요?`)) return;

        db.ref('submissions').once('value').then(snapshot => {
            const data = snapshot.val();
            if (!data) return;
            const updates = {};
            Object.entries(data).forEach(([key, val]) => {
                if (String(val.problemId) === String(problemId)) updates[key] = null;
            });
            db.ref('submissions').update(updates).then(() => {
                const local = getSubmissionHistory().filter(h => String(h.problemId) !== String(problemId));
                localStorage.setItem('submission_history', JSON.stringify(local));
                alert(`문제 ${problemId}번 삭제 완료`);
                renderPage(location.hash.substring(1) || '');
            });
        });
    }
    function deleteOneEntry(localIdx) {
        if (!ADMINS.includes(getSession()?.id)) return alert('관리자만 가능합니다.');
        if (!confirm('이 기록을 삭제할까요?')) return;

        const local = getSubmissionHistory();
        const target = local[localIdx];
        if (!target) return;

        // Firebase에서 일치하는 항목 찾아 삭제
        db.ref('submissions').once('value').then(snapshot => {
            const data = snapshot.val();
            if (!data) return;
            const matchKey = Object.entries(data).find(([, val]) =>
                val.user === target.user &&
                val.problemId === target.problemId &&
                val.time === target.time
            )?.[0];

            if (matchKey) {
                db.ref(`submissions/${matchKey}`).remove().then(() => {
                    local.splice(localIdx, 1);
                    localStorage.setItem('submission_history', JSON.stringify(local));
                    renderPage(location.hash.substring(1) || '');
                });
            }
        });
    }
    // ── 세션 관리 ──
    function getSession() {
        try { return JSON.parse(sessionStorage.getItem('oj_session')); } catch { return null; }
    }
    function setSession(id) {
        sessionStorage.setItem('oj_session', JSON.stringify({ id }));
    }
    function clearSession() {
        sessionStorage.removeItem('oj_session');
    }
    function isLoggedIn() {
        return !!getSession();
    }

    // ── UI 업데이트 ──
    function updateAuthUI() {
    const session = getSession();
    const loginBtn  = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const userLabel = document.getElementById('user-label');
    if (session) {
        loginBtn.style.display  = 'none';
        logoutBtn.style.display = 'inline-block';
        const score = getUserScore(session.id);
        const tier  = getTier(session.id, score);
        userLabel.innerHTML = `
            <span style="color:${tier.color};font-weight:bold;">${tier.name}</span>
            ${session.id}
            <span style="font-size:12px;color:#888;">(${score}점)</span>
        `;
    } else {
        loginBtn.style.display  = 'inline-block';
        logoutBtn.style.display = 'none';
        userLabel.textContent   = '';
    }
}

    // ── 로그인 모달 ──
    function openLoginModal() {
        document.getElementById('login-overlay').classList.add('show');
        document.getElementById('login-id').value = '';
        document.getElementById('login-pw').value = '';
        document.getElementById('login-error').textContent = '';
        setTimeout(() => document.getElementById('login-id').focus(), 50);
    }
    function closeLoginModal() {
        document.getElementById('login-overlay').classList.remove('show');
    }

    function tryLogin() {
        const id = document.getElementById('login-id').value.trim();
        const pw = document.getElementById('login-pw').value;
        const errEl = document.getElementById('login-error');

        if (!id || !pw) { errEl.textContent = '아이디와 비밀번호를 입력하세요.'; return; }

        const match = ACCOUNTS.find(a => a.id === id && a.pw === pw);
        if (match) {
            setSession(id);
            closeLoginModal();
            updateAuthUI();
            // 현재 페이지 재렌더 (제출 탭이면 제출 폼 표시)
            renderPage(location.hash.substring(1) || '');
        } else {
            errEl.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
            document.getElementById('login-pw').value = '';
            document.getElementById('login-pw').focus();
        }
    }

    function logout() {
        clearSession();
        updateAuthUI();
        renderPage(location.hash.substring(1) || '');
    }
    function setProblemScore(problemId) {

    // ── 채점 로직 ──
    async function judgeCode(problemId) {
        if (!isLoggedIn()) { openLoginModal(); return; }

        const userCode = document.getElementById('output-input').value;
        const resultBox = document.getElementById('result-box');
        const submitBtn = document.getElementById('submit-btn');
        const problem = problemData[problemId];

        if (!userCode.trim()) return alert("코드를 입력하세요!");

        if (!window.pyodide) {
            resultBox.style.display = 'block';
            resultBox.innerText = "파이썬 엔진을 준비 중입니다 (잠시만 기다려주세요)...";
            window.pyodide = await loadPyodide();
        }

        submitBtn.disabled = true;
        resultBox.style.display = 'block';
        resultBox.className = '';
        resultBox.innerText = "채점 중...";

        try {
            let passCount = 0;
            const cases = problem.testCases || [];

            if (cases.length === 0) {
                resultBox.innerText = "이 문제는 자동 채점을 지원하지 않습니다.";
                submitBtn.disabled = false;
                return;
            }

            for (const tc of cases) {
                const setupScript = `
import sys, io
sys.stdout = io.StringIO()
input_data = ${JSON.stringify(tc.input.split(/\s+/).filter(x => x !== ''))}
def input(p=''): return input_data.pop(0) if input_data else ""
`;
                await pyodide.runPythonAsync(setupScript + "\n" + userCode);
                const output = pyodide.runPython("sys.stdout.getvalue()");

                if (normalize(output) === normalize(tc.expected)) passCount++;
            }

            if (passCount === cases.length) {
                saveSubmission(problemId, '맞았습니다');
                resultBox.className = 'correct';
                resultBox.innerText = "✅ 맞았습니다! 모든 테스트 통과!";
            } else {
                saveSubmission(problemId, '틀렸습니다');
                resultBox.className = 'wrong';
                resultBox.innerText = `❌ 틀렸습니다. (${passCount}/${cases.length} 통과)`;
            }
        } catch (err) {
            resultBox.className = 'wrong';
            resultBox.innerText = "⚠️ 런타임 에러:\n" + err.message;
        } finally {
            submitBtn.disabled = false;
        }
    }

    function normalize(str) {
        return str.toString().trim().replace(/\r\n/g, '\n').split('\n').map(l => l.trimEnd()).join('\n');
    }

    function getSubmissionHistory() {
        return JSON.parse(localStorage.getItem('submission_history') || '[]');
    }

    function saveSubmission(problemId, result) {
        const session = getSession();
        if (!session) return;
        const userCode = document.getElementById('output-input')?.value || '';
        const entry = {
            user: session.id,
            problemId,
            result,
            code: userCode,  // ← 추가
            time: new Date().toLocaleString()
        };
        db.ref('submissions').push(entry);
        const history = getSubmissionHistory();
        history.unshift(entry);
        localStorage.setItem('submission_history', JSON.stringify(history));
    }

        // Firebase 다 받은 후에 렌더링
        mainContent.className = '';
        let route = routes[path];
        let currentProblemId = null;
        let currentTabName = 'problem';

        if (!route && path.startsWith('/problems/')) {
            const parts = path.substring('/problems/'.length).split('/');
            currentProblemId = parts[0];
            currentTabName = parts.length > 1 ? parts[1] : 'problem';

            if (problemData[currentProblemId]) {
                route = {
                    title: problemData[currentProblemId].title,
                    contentGenerator: () => `
                        <h2 class="problem-title">${problemData[currentProblemId].title}</h2>
                        <div class="problem-tabs">
                            <button class="tab-button" data-tab="problem" data-problem-id="${currentProblemId}">문제</button>
                            <button class="tab-button" data-tab="submission" data-problem-id="${currentProblemId}">제출</button>
                            <button class="tab-button" data-tab="status" data-problem-id="${currentProblemId}">채점현황</button>
                        </div>
                        <div class="tab-content-container">
                            <div id="problem-tab-content" class="tab-pane">
                                <div class="problem-detail-content">
                                    ${problemData[currentProblemId].content}
                                </div>
                            </div>
                            <div id="submission-tab-content" class="tab-pane">
                                ${buildSubmissionTab(currentProblemId)}
                            </div>
                            <div id="status-tab-content" class="tab-pane">
                                ${buildStatusTab(currentProblemId)}
                            </div>
                        </div>
                    `,
                    cssClass: 'problem-detail'
                };
            }
        }

        if (route) {
            mainContent.innerHTML = route.contentGenerator ? route.contentGenerator() : route.content;
            document.title = route.title;
            if (route.cssClass) mainContent.classList.add(route.cssClass);
            if (currentProblemId) activateTab(currentTabName);
        } else {
            history.replaceState({ path: '' }, '', '#');
            renderPage('');
        }
    });
}
    function activateTab(tabName) {
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
        const activeButton = document.querySelector(`.tab-button[data-tab="${tabName}"]`);
        if (activeButton) activeButton.classList.add('active');
        const activePane = document.getElementById(`${tabName}-tab-content`);
        if (activePane) activePane.classList.add('active');
    }

    // ── 이벤트 리스너 ──
    logoImage.addEventListener('click', () => {
        history.pushState({ path: '' }, '', '#');
        renderPage('');
    });

    problemButton.addEventListener('click', () => {
        const path = '/problems';
        history.pushState({ path }, '', `#${path}`);
        renderPage(path);
    });

    mainContent.addEventListener('click', (event) => {
        const target = event.target;
        if (target.tagName === 'A' && target.dataset.path && target.dataset.path.startsWith('/problems/')) {
            event.preventDefault();
            const fullPath = `${target.dataset.path}/problem`;
            history.pushState({ path: fullPath }, '', `#${fullPath}`);
            renderPage(fullPath);
        } else if (target.classList.contains('tab-button')) {
            const tabName = target.dataset.tab;
            const problemId = target.dataset.problemId;
            if (tabName && problemId) {
                const newPath = `/problems/${problemId}/${tabName}`;
                history.pushState({ path: newPath }, '', `#${newPath}`);
                renderPage(newPath);
            }
        }
    });

    window.addEventListener('popstate', () => {
        updateAuthUI();

        // Firebase에서 문제 점수 불러오기
        db.ref('problemScores').once('value').then(snapshot => {
            const scores = snapshot.val();
            if (scores) {
                Object.entries(scores).forEach(([id, score]) => {
                    if (problemData[id]) problemData[id].score = score;
                });
            }
        });

        const initialHash = location.hash.substring(1) || '';
        renderPage(initialHash);
        renderPage(location.hash.substring(1) || '');
    });

    window.addEventListener('load', () => {
        updateAuthUI();

        const initialHash = location.hash.substring(1) || '';

        // 점수 먼저 불러온 다음에 렌더링
        db.ref('problemScores').once('value').then(snapshot => {
            const scores = snapshot.val();
            if (scores) {
                Object.entries(scores).forEach(([id, score]) => {
                    if (problemData[id]) problemData[id].score = score;
                });
            }
            // 점수 다 불러온 후에 렌더링
            renderPage(initialHash);
            if (initialHash.startsWith('/problems/') && initialHash.split('/').length === 2) {
                history.replaceState({ path: `${initialHash}/problem` }, '', `#${initialHash}/problem`);
            } else {
                history.replaceState({ path: initialHash }, '', `#${initialHash}`);
            }
        });
    });
    function filterCat(cat) {
    // 버튼 스타일 토글
    document.querySelectorAll('.cat-btn').forEach(btn => {
        if (btn.dataset.cat === cat) {
            btn.style.background = '#808080';
            btn.style.color = 'white';
        } else {
            btn.style.background = '#eee';
            btn.style.color = '#555';
        }
    });

    const container = document.getElementById('problems-container');

    if (cat === '전체') {
        // 전체: 카테고리 헤더 숨기고 문제만 번호순으로 flat하게
        document.querySelectorAll('.cat-group').forEach(group => group.style.display = 'none');

        let flatHtml = '<div class="problem-list"><ul>';
        // problemData는 키가 숫자 순서이므로 그냥 순서대로
        for (const id in problemData) {
            const score = problemData[id].score || 5;
            let diffColor = '#cd7f32', diffName = 'Bronze';
            if (score >= 21) { diffColor = '#9b59b6'; diffName = 'Master'; }
            else if (score >= 16) { diffColor = '#00c8ff'; diffName = 'Platinum'; }
            else if (score >= 11) { diffColor = '#f1c40f'; diffName = 'Gold'; }
            else if (score >= 6) { diffColor = '#a0a0a0'; diffName = 'Silver'; }

            const history = JSON.parse(localStorage.getItem('submission_history') || '[]');
            const session = JSON.parse(sessionStorage.getItem('oj_session') || 'null');
            let statusIcon = '';
            if (session) {
                const myHistory = history.filter(h => h.user === session.id && String(h.problemId) === String(id));
                const solved = myHistory.some(h => h.result === '맞았습니다');
                const tried = myHistory.some(h => h.result === '틀렸습니다');
                if (solved) statusIcon = `<span style="color:#4caf50;font-size:18px;margin-right:6px;">✔</span>`;
                else if (tried) statusIcon = `<span style="color:#e53935;font-size:18px;margin-right:6px;">✖</span>`;
                else statusIcon = `<span style="color:#ddd;font-size:18px;margin-right:6px;">○</span>`;
            }

            flatHtml += `
                <li style="display:flex;align-items:center;">
                    ${statusIcon}
                    <a href="#/problems/${id}" data-path="/problems/${id}" style="flex:1;">
                        <span style="color:${diffColor};font-weight:bold;margin-right:8px;">[${diffName} ${score}점]</span>
                        ${problemData[id].title}
                    </a>
                </li>
            `;
        }
        flatHtml += '</ul></div>';

        // 기존 flat-list 있으면 제거 후 다시 추가
        const existing = document.getElementById('flat-list');
        if (existing) existing.remove();
        const div = document.createElement('div');
        div.id = 'flat-list';
        div.innerHTML = flatHtml;
        container.appendChild(div);

    } else {
        // 특정 카테고리: flat-list 숨기고 카테고리 그룹 표시
        const existing = document.getElementById('flat-list');
        if (existing) existing.remove();

        document.querySelectorAll('.cat-group').forEach(group => {
            group.style.display = group.dataset.cat === cat ? 'block' : 'none';
        });
    }
}
    </script>
</body>
</html>
